<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}, dir=${dir}">
<head>
<title>Reset Password — ProTech One</title>
<th:block th:replace="~{fragments/layout :: headAssets}"></th:block>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <span class="home-logo d-block">ProTech One</span>
    <p class="auth-subtitle">Choose a new password</p>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form th:action="@{/reset-password}" method="post">
      <input type="hidden" name="token" th:value="${token}"/>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" class="form-control" name="newPassword" minlength="8" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Reset Password</button>
    </form>
  </div>
</div>
</body>
</html>
