<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}, dir=${dir}">
<head>
<title>Forgot Password — ProTech One</title>
<th:block th:replace="~{fragments/layout :: headAssets}"></th:block>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <span class="home-logo d-block">ProTech One</span>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <form th:action="@{/forgot-password}" method="post">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" name="email" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Send Reset Link</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:13px;"><a th:href="@{/login}"><i class="fa-solid fa-arrow-left me-1"></i>Back to sign in</a></p>
  </div>
</div>
</body>
</html>
