<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}, dir=${dir}">
<head>
<title>Create Workspace — ProTech One</title>
<th:block th:replace="~{fragments/layout :: headAssets}"></th:block>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="max-width:460px;">
    <span class="home-logo d-block">ProTech One</span>
    <p class="auth-subtitle">Create your company workspace — you become the Company Administrator</p>

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
      <div class="form-group">
        <label class="form-label">Company name</label>
        <input type="text" class="form-control" th:field="*{companyName}" placeholder="Acme Retail LLC" required/>
      </div>
      <div class="form-row cols-2">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">First name</label>
          <input type="text" class="form-control" th:field="*{firstName}" required/>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Last name</label>
          <input type="text" class="form-control" th:field="*{lastName}" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Work email</label>
        <input type="email" class="form-control" th:field="*{email}" placeholder="you@company.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" th:field="*{password}" placeholder="At least 8 characters" minlength="8" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Create Account</button>
    </form>

    <hr style="margin:24px 0;border-color:var(--border);"/>
    <p style="text-align:center;font-size:13px;">Already have an account? <a th:href="@{/login}">Sign in</a></p>
  </div>
</div>
</body>
</html>
