<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}, dir=${dir}">
<head>
<title>Sign In — ProTech One</title>
<th:block th:replace="~{fragments/layout :: headAssets}"></th:block>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <span class="home-logo d-block">ProTech One</span>
    <p class="auth-subtitle">Sign in to your business workspace</p>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" name="email" placeholder="you@company.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="********" required/>
      </div>
      <div style="text-align:right;margin-bottom:14px;">
        <a th:href="@{/forgot-password}" style="font-size:12.5px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Sign In</button>
    </form>

    <hr style="margin:24px 0;border-color:var(--border);"/>
    <p style="text-align:center;font-size:13px;">
      New to ProTech One? <a th:href="@{/register}">Create your company workspace</a>
    </p>

    <div style="margin-top:12px;padding:10px;background:var(--background);border-radius:8px;font-size:11.5px;color:var(--text-secondary);text-align:center;">
      Demo login: <strong>admin@protechone.com</strong> / <strong>Admin@123</strong>
    </div>
  </div>
</div>
</body>
</html>
