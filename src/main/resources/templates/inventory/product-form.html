<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}, dir=${dir}">
<head>
<title th:text="${isEdit} ? 'Edit Product — ProTech One' : 'Add Product — ProTech One'">Product</title>
<th:block th:replace="~{fragments/layout :: headAssets}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: shellToggles}"></th:block>
<div class="app-shell" id="appShell">
  <th:block th:replace="~{fragments/layout :: sidebar(active='products')}"></th:block>
  <th:block th:replace="~{fragments/layout :: sidebarBackdrop}"></th:block>
  <div class="main-wrap">
    <th:block th:replace="~{fragments/layout :: topbar}"></th:block>
    <div class="content">
      <div class="page-header">
        <div><h2 th:text="${isEdit} ? 'Edit Product' : 'Add Product'">Product</h2></div>
      </div>

      <div class="card" style="margin-bottom:16px;" th:unless="${isEdit}">
        <div class="card-header"><h6>Quick add category</h6></div>
        <div class="card-body">
          <form th:action="@{/products/category}" method="post" style="display:flex;gap:8px;">
            <input type="text" name="name" class="form-control" placeholder="Category name" required style="max-width:280px;"/>
            <button type="submit" class="btn btn-outline btn-sm">Add Category</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <form th:action="${isEdit} ? @{/products/{id}/edit(id=${productId})} : @{/products}" th:object="${form}" method="post">
            <div class="form-row cols-3">
              <div class="form-group"><label class="form-label">SKU *</label><input class="form-control" th:field="*{sku}" required/></div>
              <div class="form-group"><label class="form-label">Barcode</label><input class="form-control" th:field="*{barcode}"/></div>
              <div class="form-group"><label class="form-label">Unit</label><input class="form-control" th:field="*{unit}"/></div>
            </div>
            <div class="form-group"><label class="form-label">Name *</label><input class="form-control" th:field="*{name}" required/></div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-control" th:field="*{categoryId}">
                  <option value="">Uncategorized</option>
                  <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">Category</option>
                </select>
              </div>
              <div class="form-group"><label class="form-label">Brand</label><input class="form-control" th:field="*{brand}"/></div>
            </div>
            <div class="form-row cols-3">
              <div class="form-group"><label class="form-label">Cost Price *</label><input type="number" step="0.01" class="form-control" th:field="*{costPrice}" required/></div>
              <div class="form-group"><label class="form-label">Selling Price *</label><input type="number" step="0.01" class="form-control" th:field="*{sellingPrice}" required/></div>
              <div class="form-group"><label class="form-label">Tax Rate (%)</label><input type="number" step="0.01" class="form-control" th:field="*{taxRate}"/></div>
            </div>
            <div class="form-row cols-3">
              <div class="form-group"><label class="form-label">Reorder Level</label><input type="number" step="0.01" class="form-control" th:field="*{reorderLevel}"/></div>
              <div class="form-group"><label class="form-label">Min Stock</label><input type="number" step="0.01" class="form-control" th:field="*{minStock}"/></div>
              <div class="form-group"><label class="form-label">Max Stock</label><input type="number" step="0.01" class="form-control" th:field="*{maxStock}"/></div>
            </div>
            <div class="form-row cols-2" th:unless="${isEdit}">
              <div class="form-group">
                <label class="form-label">Opening Warehouse</label>
                <select class="form-control" th:field="*{warehouseId}">
                  <option th:each="w : ${warehouses}" th:value="${w.id}" th:text="${w.name}">Warehouse</option>
                </select>
              </div>
              <div class="form-group"><label class="form-label">Opening Quantity</label><input type="number" step="0.01" class="form-control" th:field="*{openingQuantity}"/></div>
            </div>
            <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" rows="2" th:field="*{description}"></textarea></div>
            <div class="form-group form-check" th:if="${isEdit}"><input type="checkbox" th:field="*{isActive}"/> <label class="form-label" style="margin:0;">Active</label></div>

            <div class="page-actions" style="margin-top:10px;">
              <button type="submit" class="btn btn-primary">Save Product</button>
              <a th:href="@{/products}" class="btn btn-outline">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
